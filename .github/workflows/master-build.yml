name: Master Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  CI: true
  HUSKY: '0'
  TZ: Asia/Shanghai

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck and Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Typecheck admin
        run: pnpm -F @vben/web-ele run typecheck

      - name: Build front
        run: pnpm run build:front

      - name: Build admin
        run: pnpm run build:ele
