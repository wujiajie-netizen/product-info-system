version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      patch-and-minor:
        update-types: [minor, patch]
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      patch-and-minor:
        update-types: [minor, patch]
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
